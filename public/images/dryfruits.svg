<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="grad20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(340, 40%, 30%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(370, 50%, 15%);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#grad20)" />
  <rect x="50" y="50" width="700" height="700" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <circle cx="400" cy="350" r="120" fill="rgba(255,255,255,0.1)" filter="url(#shadow)" />
  <text x="400" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="80" fill="#ffffff" text-anchor="middle" font-weight="bold" opacity="0.8">M</text>
  <text x="400" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="600" opacity="0.9">Mixed Dry Fruits</text>
  <text x="400" y="630" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.6">Premium Quality</text>
</svg>